<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F1419">
    <meta name="description" content="TechLearn Pro - Progressive Web App for volunteer training">
    <title>TechLearn Pro - CRC Training</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230F1419' width='192' height='192'/><g stroke='%2300D9FF' stroke-width='12' fill='none'><line x1='96' y1='30' x2='96' y2='162'/><line x1='30' y1='96' x2='162' y2='96'/></g></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #0F1419;
            color: #ECEDEE;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            font-size: 16px;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        #root {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .header {
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        .header p {
            color: #9BA1A6;
            font-size: 0.95rem;
        }
        .progress-card {
            background: #1e2022;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .progress-label {
            color: #9BA1A6;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        .progress-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00D9FF;
            margin-bottom: 0.5rem;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 1rem;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00D9FF, #0099CC);
            transition: width 0.3s ease;
        }
        .sections-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .sections-grid {
            display: grid;
            gap: 1rem;
            flex: 1;
        }
        .section-card {
            background: #1e2022;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .section-card:hover {
            background: #252729;
            border-color: #00D9FF;
        }
        .section-card-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 48px;
            height: 48px;
            background: #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.25rem;
            color: #00D9FF;
        }
        .section-card h3 {
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
            color: #ECEDEE;
        }
        .section-card p {
            color: #9BA1A6;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        .section-progress {
            color: #9BA1A6;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .section-progress-bar {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            overflow: hidden;
        }
        .section-progress-fill {
            height: 100%;
            background: #00D9FF;
            transition: width 0.3s ease;
        }
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 60px;
            background: #1e2022;
            border-top: 1px solid #334155;
            margin-top: auto;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #9BA1A6;
            transition: color 0.2s ease;
            text-decoration: none;
            font-size: 0.75rem;
            gap: 0.25rem;
        }
        .nav-item.active {
            color: #00D9FF;
        }
        .nav-icon {
            font-size: 1.5rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            padding: 1rem;
        }
        .modal.active {
            display: flex;
            align-items: flex-end;
        }
        .modal-content {
            background: #0F1419;
            width: 100%;
            max-width: 600px;
            border-radius: 1rem 1rem 0 0;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            background: #0F1419;
        }
        .modal-header h2 {
            font-size: 1.5rem;
        }
        .close-btn {
            background: none;
            border: none;
            color: #ECEDEE;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .modal-body {
            padding: 1.5rem;
        }
        .module-item {
            background: #1e2022;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .module-header {
            padding: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .module-header:hover {
            background: #252729;
        }
        .module-title {
            font-weight: 500;
            color: #ECEDEE;
        }
        .module-content {
            display: none;
            padding: 1rem;
            border-top: 1px solid #334155;
            background: #151718;
        }
        .module-content.active {
            display: block;
        }
        .step-item {
            background: #1e2022;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }
        .step-header {
            padding: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .step-header:hover {
            background: #252729;
        }
        .step-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: #00D9FF;
            color: #0F1419;
            border-radius: 50%;
            font-weight: bold;
            font-size: 0.875rem;
            margin-right: 1rem;
        }
        .step-title {
            flex: 1;
            font-weight: 500;
            color: #ECEDEE;
        }
        .step-content {
            display: none;
            padding: 1rem;
            border-top: 1px solid #334155;
            background: #151718;
            color: #ECEDEE;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .step-content.active {
            display: block;
        }
        .chevron {
            color: #9BA1A6;
            transition: transform 0.3s ease;
        }
        .chevron.active {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script>
        const lmsData = [
            {
                id: 'live-stream',
                title: 'Live Stream',
                description: 'Learn how to set up and manage live streaming',
                color: '#00D9FF',
                modules: [
                    {
                        id: 'youtube-setup',
                        title: 'Setup YouTube',
                        description: 'Configure YouTube Studio for live streaming',
                        steps: [
                            { id: 'step-1', title: 'Click on Schedule Stream', content: 'Navigate to YouTube Studio and click on "Schedule Stream" to begin setting up your live broadcast.' },
                            { id: 'step-2', title: 'Click on Create New', content: 'Click the "Create New" button to start a new stream schedule.' },
                            { id: 'step-3', title: 'Add Sermon Title', content: 'Copy and paste the sermon title from your Google Doc into the title field.' },
                            { id: 'step-4', title: 'Add Description', content: 'Copy and paste the description from your Google Doc. Press enter to create space and paste the description without deleting other text.' },
                            { id: 'step-5', title: 'Configure Category', content: 'Check "Nonprofits & Activism" in the category section.' },
                            { id: 'step-6', title: 'Upload Thumbnail', content: 'Upload custom thumbnail from Broadcast → Today\'s Folder → Select Sermon Image.' },
                            { id: 'step-7', title: 'Set Playlist & Tags', content: 'Select "Pastor At Boshoff Sermons" playlist (only when Ps.At is preaching). Add tags from the sermon description separately.' },
                            { id: 'step-8', title: 'Configure Stream Settings', content: 'Set comments to OFF. Select Public for 08:30 and 18:00 or Unlisted for 10:30. Select time 08:25, 10:25, or 17:55. Enable Closed Captions and POST TO URL.' }
                        ]
                    },
                    {
                        id: 'obs-config',
                        title: 'OBS Configuration',
                        description: 'Set up OBS for streaming',
                        steps: [
                            { id: 'step-1', title: 'Install OBS', content: 'Download and install OBS Studio from obsproject.com' },
                            { id: 'step-2', title: 'Configure Settings', content: 'Open Settings and configure video and audio settings' }
                        ]
                    },
                    {
                        id: 'live-best-practices',
                        title: 'Going Live Best Practices',
                        description: 'Best practices for live streaming',
                        steps: [
                            { id: 'step-1', title: 'Test Before Going Live', content: 'Always test your setup before going live' },
                            { id: 'step-2', title: 'Monitor Chat', content: 'Keep an eye on the chat during the stream' }
                        ]
                    }
                ]
            },
            {
                id: 'link',
                title: 'Link',
                description: 'Master link creation and management',
                color: '#00CC99',
                modules: [
                    {
                        id: 'create-links',
                        title: 'Creating Shareable Links',
                        description: 'Learn how to create shareable links',
                        steps: [
                            { id: 'step-1', title: 'Generate Link', content: 'Use your link management tool to generate a new shareable link' },
                            { id: 'step-2', title: 'Customize Link', content: 'Customize the link parameters as needed' }
                        ]
                    },
                    {
                        id: 'link-management',
                        title: 'Link Management Best Practices',
                        description: 'Best practices for managing links',
                        steps: [
                            { id: 'step-1', title: 'Track Links', content: 'Monitor link performance and usage' },
                            { id: 'step-2', title: 'Update Links', content: 'Update links as needed for campaigns' }
                        ]
                    },
                    {
                        id: 'link-performance',
                        title: 'Tracking Link Performance',
                        description: 'Track and analyze link metrics',
                        steps: [
                            { id: 'step-1', title: 'View Analytics', content: 'Access link analytics dashboard' },
                            { id: 'step-2', title: 'Analyze Data', content: 'Review click-through rates and engagement metrics' }
                        ]
                    }
                ]
            },
            {
                id: 'technical',
                title: 'Technical',
                description: 'Technical training and system setup',
                color: '#FF9900',
                modules: [
                    {
                        id: 'system-setup',
                        title: 'System Setup',
                        description: 'Set up your technical environment',
                        steps: [
                            { id: 'step-1', title: 'Install Requirements', content: 'Install all required software and tools' },
                            { id: 'step-2', title: 'Configure System', content: 'Configure your system settings' }
                        ]
                    },
                    {
                        id: 'troubleshooting',
                        title: 'Troubleshooting Common Issues',
                        description: 'Resolve common technical issues',
                        steps: [
                            { id: 'step-1', title: 'Identify Problem', content: 'Identify the technical issue' },
                            { id: 'step-2', title: 'Apply Solution', content: 'Follow troubleshooting steps' }
                        ]
                    },
                    {
                        id: 'advanced-features',
                        title: 'Advanced Features',
                        description: 'Learn advanced technical features',
                        steps: [
                            { id: 'step-1', title: 'Explore Features', content: 'Discover advanced capabilities' },
                            { id: 'step-2', title: 'Master Features', content: 'Learn how to use advanced features effectively' }
                        ]
                    }
                ]
            }
        ];

        let currentView = 'home';
        let selectedSection = null;
        let selectedModule = null;
        let progress = JSON.parse(localStorage.getItem('lms-progress') || '{}');

        function calculateProgress() {
            const total = lmsData.reduce((sum, s) => sum + s.modules.length, 0);
            const completed = Object.values(progress).filter(Boolean).length;
            return { completed, total };
        }

        function render() {
            const root = document.getElementById('root');
            
            if (currentView === 'home') {
                renderHome(root);
            } else if (currentView === 'section') {
                renderSection(root);
            } else if (currentView === 'progress') {
                renderProgress(root);
            } else if (currentView === 'settings') {
                renderSettings(root);
            }
        }

        function renderHome(root) {
            const { completed, total } = calculateProgress();
            const progressPercent = total > 0 ? Math.round((completed / total) * 100) : 0;

            root.innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1>Welcome</h1>
                        <p>Complete your volunteer training at your own pace</p>
                    </div>

                    <div class="progress-card">
                        <div class="progress-label">YOUR PROGRESS</div>
                        <div class="progress-value">${progressPercent}%</div>
                        <div style="color: #9BA1A6; font-size: 0.875rem; margin-bottom: 1rem;">${completed} of ${total} modules</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progressPercent}%"></div>
                        </div>
                    </div>

                    <div class="sections-title">Training Sections</div>
                    <div class="sections-grid">
                        ${lmsData.map(section => {
                            const sectionModules = section.modules;
                            const sectionCompleted = sectionModules.filter(m => progress[m.id]).length;
                            const sectionPercent = Math.round((sectionCompleted / sectionModules.length) * 100);
                            
                            return `
                                <div class="section-card" onclick="selectSection('${section.id}')">
                                    <div class="section-card-badge">${sectionModules.length}</div>
                                    <h3>${section.title}</h3>
                                    <p>${section.description}</p>
                                    <div class="section-progress">Progress: ${sectionPercent}% • ${sectionCompleted}/${sectionModules.length}</div>
                                    <div class="section-progress-bar">
                                        <div class="section-progress-fill" style="width: ${sectionPercent}%; background: ${section.color};"></div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>

                <div class="bottom-nav">
                    <div class="nav-item active" onclick="goHome()">
                        <div class="nav-icon">🏠</div>
                        <div>Home</div>
                    </div>
                    <div class="nav-item" onclick="goProgress()">
                        <div class="nav-icon">📊</div>
                        <div>Progress</div>
                    </div>
                    <div class="nav-item" onclick="goSettings()">
                        <div class="nav-icon">⚙️</div>
                        <div>Settings</div>
                    </div>
                </div>
            `;
        }

        function renderSection(root) {
            const section = lmsData.find(s => s.id === selectedSection);
            if (!section) return;

            root.innerHTML = `
                <div class="modal active">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2>${section.title}</h2>
                            <button class="close-btn" onclick="goHome()">✕</button>
                        </div>
                        <div class="modal-body">
                            ${section.modules.map(module => `
                                <div class="module-item">
                                    <div class="module-header" onclick="toggleModule('${module.id}')">
                                        <div class="module-title">${module.title}</div>
                                        <div class="chevron" id="chevron-${module.id}">▼</div>
                                    </div>
                                    <div class="module-content" id="module-${module.id}">
                                        ${module.steps.map((step, idx) => `
                                            <div class="step-item">
                                                <div class="step-header" onclick="toggleStep('${step.id}')">
                                                    <div class="step-number">${idx + 1}</div>
                                                    <div class="step-title">${step.title}</div>
                                                    <div class="chevron" id="chevron-${step.id}">▼</div>
                                                </div>
                                                <div class="step-content" id="step-${step.id}">${step.content}</div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderProgress(root) {
            const { completed, total } = calculateProgress();
            const progressPercent = total > 0 ? Math.round((completed / total) * 100) : 0;

            root.innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1>Progress</h1>
                        <p>Your learning journey</p>
                    </div>

                    <div class="progress-card">
                        <div class="progress-label">OVERALL PROGRESS</div>
                        <div class="progress-value">${progressPercent}%</div>
                        <div style="color: #9BA1A6; font-size: 0.875rem; margin-bottom: 1rem;">${completed} of ${total} modules completed</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progressPercent}%"></div>
                        </div>
                    </div>

                    <div class="sections-title">Section Progress</div>
                    <div class="sections-grid">
                        ${lmsData.map(section => {
                            const sectionModules = section.modules;
                            const sectionCompleted = sectionModules.filter(m => progress[m.id]).length;
                            const sectionPercent = Math.round((sectionCompleted / sectionModules.length) * 100);
                            
                            return `
                                <div class="section-card">
                                    <h3>${section.title}</h3>
                                    <div class="section-progress">${sectionPercent}% • ${sectionCompleted}/${sectionModules.length}</div>
                                    <div class="section-progress-bar">
                                        <div class="section-progress-fill" style="width: ${sectionPercent}%; background: ${section.color};"></div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>

                <div class="bottom-nav">
                    <div class="nav-item" onclick="goHome()">
                        <div class="nav-icon">🏠</div>
                        <div>Home</div>
                    </div>
                    <div class="nav-item active" onclick="goProgress()">
                        <div class="nav-icon">📊</div>
                        <div>Progress</div>
                    </div>
                    <div class="nav-item" onclick="goSettings()">
                        <div class="nav-icon">⚙️</div>
                        <div>Settings</div>
                    </div>
                </div>
            `;
        }

        function renderSettings(root) {
            root.innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1>Settings</h1>
                        <p>App information and preferences</p>
                    </div>

                    <div class="progress-card">
                        <h3>TechLearn Pro</h3>
                        <p style="color: #9BA1A6; margin: 0.5rem 0;">Version 1.0.0</p>
                        <p style="color: #9BA1A6; margin: 0.5rem 0; font-size: 0.875rem;">Progressive Web App for volunteer training</p>
                    </div>

                    <div class="progress-card">
                        <h3>About</h3>
                        <p style="color: #9BA1A6; line-height: 1.6;">This app provides self-paced training modules for volunteers. Complete modules at your own pace and track your progress.</p>
                    </div>

                    <div class="progress-card">
                        <button onclick="clearProgress()" style="width: 100%; padding: 0.75rem; background: #FF3366; color: white; border: none; border-radius: 0.375rem; cursor: pointer; font-weight: 600;">Clear Progress</button>
                    </div>
                </div>

                <div class="bottom-nav">
                    <div class="nav-item" onclick="goHome()">
                        <div class="nav-icon">🏠</div>
                        <div>Home</div>
                    </div>
                    <div class="nav-item" onclick="goProgress()">
                        <div class="nav-icon">📊</div>
                        <div>Progress</div>
                    </div>
                    <div class="nav-item active" onclick="goSettings()">
                        <div class="nav-icon">⚙️</div>
                        <div>Settings</div>
                    </div>
                </div>
            `;
        }

        function selectSection(sectionId) {
            selectedSection = sectionId;
            currentView = 'section';
            render();
        }

        function toggleModule(moduleId) {
            const moduleContent = document.getElementById(`module-${moduleId}`);
            const chevron = document.getElementById(`chevron-${moduleId}`);
            
            if (moduleContent) {
                moduleContent.classList.toggle('active');
                chevron.classList.toggle('active');
            }

            progress[moduleId] = !progress[moduleId];
            localStorage.setItem('lms-progress', JSON.stringify(progress));
        }

        function toggleStep(stepId) {
            const stepContent = document.getElementById(`step-${stepId}`);
            const chevron = document.getElementById(`chevron-${stepId}`);
            
            if (stepContent) {
                stepContent.classList.toggle('active');
                chevron.classList.toggle('active');
            }
        }

        function goHome() {
            currentView = 'home';
            selectedSection = null;
            render();
        }

        function goProgress() {
            currentView = 'progress';
            render();
        }

        function goSettings() {
            currentView = 'settings';
            render();
        }

        function clearProgress() {
            if (confirm('Are you sure you want to clear all progress?')) {
                progress = {};
                localStorage.clear();
                render();
            }
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log('ServiceWorker registration failed: ', err);
            });
        }

        // Initial render
        render();
    </script>
</body>
</html>
